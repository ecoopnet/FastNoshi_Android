# 禁止事項・指摘履歴
# ユーザーに指摘を受けたら追記する

rules:
  - id: no-external-edit
    description: "Android プロジェクトフォルダ以外のファイル操作禁止（参照のみ許可）"
    severity: critical

  - id: no-main-direct
    description: "main ブランチへの直接コミット禁止"
    severity: critical

  - id: test-first
    description: "テストを先に書く。実装からはじめない"
    severity: high

  - id: no-duplicate-code
    description: "重複コード禁止。共通化を徹底する"
    severity: high

  - id: ktlint-pass
    description: "ktlint を通さずにコミットしない"
    severity: high

  - id: no-hardcoded-secrets
    description: "API キーやシークレットをハードコードしない"
    severity: critical

  - id: spec-before-impl
    description: "仕様書に落とし込んでから実装する"
    severity: high

  - id: ask-for-big-decisions
    description: "大きな判断は社長に確認。軽微な対応は事後報告"
    severity: medium

  - id: api-code-values-in-enum
    description: "APIに送るコード値(paperSize='0',colorMode='1'等)はenumで型安全に管理する。display名やString直書きで送らない。iOS版のenum/computed propertyに対応するKotlin enumを必ず作る"
    severity: critical
    incident: "2026-04-03: paperSize='A4'/colorMode='color'を送って400エラー。正しくは'0'/'1'"

  - id: retrofit-multipart-no-json-encode
    description: "Retrofitのmultipart uploadで@Part('name')にString/Intを渡すとMoshiがJSON encodeする(クォート付き)。MultipartBody.Part.createFormData()を使ってプレーンテキストで送ること"
    severity: critical
    incident: "2026-04-03: multipartパラメータがJSON encode('0'がクォート付き)でNPS APIが401返却"
